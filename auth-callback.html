<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Contact Analyzer - Authentication</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            font-size: 16px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Completing Sign In</h1>
        <p>Please wait while we redirect you back to the extension...</p>
    </div>

    <!-- MSAL.js Library -->
    <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
    
    <script>
        console.log('Auth callback page loaded');
        console.log('Current URL:', window.location.href);
        
        // This page receives the OAuth redirect from Azure AD
        // MSAL in the extension popup window will capture the token
        
        // Check if this is a popup window opened by the extension
        if (window.opener && !window.opener.closed) {
            console.log('Popup window detected - extension will handle token');
            
            // The extension's MSAL instance will capture the token automatically
            // Just close this window after a brief delay
            setTimeout(() => {
                console.log('Closing auth popup...');
                window.close();
            }, 1000);
        } else {
            // Direct navigation (shouldn't happen in normal flow)
            console.log('Not a popup window - showing message');
            document.querySelector('p').textContent = 
                'Authentication complete. You can close this window.';
        }
        
        // Log any errors
        window.addEventListener('error', (e) => {
            console.error('Page error:', e);
        });
    </script>
</body>
</html>
